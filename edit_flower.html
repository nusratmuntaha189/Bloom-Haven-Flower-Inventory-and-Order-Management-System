{% extends 'base.html' %}
{% block title %}Edit Flower - Bloom Haven{% endblock %}
{% block content %}
<h1>Edit Flower</h1>
<form method="POST" class="form-box">
    <label for="name">Flower Name</label>
    <input type="text" id="name" name="name" value="{{ flower.name }}" required>

    <label for="price">Price (৳)</label>
    <input type="number" id="price" step="0.01" min="0" name="price" value="{{ flower.price }}" required>

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" min="0" name="quantity" value="{{ flower.quantity }}" required>

    <label for="category">Category</label>
    <input type="text" id="category" name="category" value="{{ flower.category }}">

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Update Flower</button>
        <a href="{{ url_for('flowers') }}" class="btn btn-cancel">Cancel</a>
    </div>
</form>
{% endblock %}
