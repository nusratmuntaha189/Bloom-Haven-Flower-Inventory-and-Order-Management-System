{% extends 'base.html' %}
{% block title %}Add Order - Bloom Haven{% endblock %}
{% block content %}
<h1>Place New Order</h1>
<form method="POST" class="form-box">
    <label for="customer_id">Customer</label>
    <select id="customer_id" name="customer_id" required>
        <option value="" disabled selected>Select a customer</option>
        {% for customer in customers %}
        <option value="{{ customer.id }}">{{ customer.name }} ({{ customer.phone }})</option>
        {% endfor %}
    </select>

    <label for="flower_id">Flower</label>
    <select id="flower_id" name="flower_id" required>
        <option value="" disabled selected>Select a flower</option>
        {% for flower in flowers %}
        <option value="{{ flower.id }}">{{ flower.name }} - ৳{{ "%.2f"|format(flower.price) }}</option>
        {% endfor %}
    </select>

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" min="1" name="quantity" required>

    <label for="order_date">Order Date</label>
    <input type="date" id="order_date" name="order_date" required>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Place Order</button>
        <a href="{{ url_for('orders') }}" class="btn btn-cancel">Cancel</a>
    </div>
</form>
{% endblock %}
