{% extends 'base.html' %}
{% block title %}Login - Bloom Haven{% endblock %}
{% block content %}
<div class="hero">
    <h1>🌸 Admin Login</h1>
    <p>Sign in to manage Bloom Haven</p>
</div>

<form method="POST" class="form-box" style="margin: 0 auto;">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="admin@bloomhaven.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Login</button>
    </div>
</form>
{% endblock %}
